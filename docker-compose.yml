services:
  backend:
    build:
      context: ./monolith/TwitterBackend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      AUTH0_ISSUER_URI: ${AUTH0_ISSUER_URI:-https://dev-evyrhl30mk03e5xh.us.auth0.com/}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-https://twitter-like-api}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:h2:mem:twitterdb}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:-org.h2.Driver}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-sa}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_AUTH0_DOMAIN: ${VITE_AUTH0_DOMAIN:-}
        VITE_AUTH0_CLIENT_ID: ${VITE_AUTH0_CLIENT_ID:-}
        VITE_AUTH0_AUDIENCE: ${VITE_AUTH0_AUDIENCE:-}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles:
      - postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-twitterdb}
      POSTGRES_USER: ${POSTGRES_USER:-twitter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-twitter}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-twitter} -d ${POSTGRES_DB:-twitterdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
